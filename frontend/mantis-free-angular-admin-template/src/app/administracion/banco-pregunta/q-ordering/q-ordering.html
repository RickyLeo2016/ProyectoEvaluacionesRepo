<div class="ordering-container">

  <!-- HEADER -->
  <div class="header mb-3">

    <button
      type="button"
      class="btn btn-primary"
      (click)="agregar()">

      + Agregar elemento

    </button>

  </div>

  <!-- LISTA -->
  <div
    cdkDropList
    class="ordering-list"
    (cdkDropListDropped)="drop($event)"
  >

    <div
      class="ordering-item"
      *ngFor="let item of items; let i = index; trackBy: trackByIndex"
      cdkDrag
    >

      <!-- HANDLE -->
      <div
        class="drag-handle"
        cdkDragHandle
      >
        ☰
      </div>

      <!-- INDEX -->
      <div class="item-index">

        {{ i + 1 }}

      </div>

      <!-- INPUT -->
      <div class="item-input">

        <input
          type="text"
          class="form-control"
          [(ngModel)]="items[i]"
          (ngModelChange)="actualizar()"
          placeholder="Ingrese un elemento"
        />

      </div>

      <!-- DELETE -->
      <button
        type="button"
        class="btn btn-danger btn-sm"
        (click)="eliminar(i)"
        [disabled]="items.length <= 2"
      >

        <i class="fas fa-trash"></i>

      </button>

    </div>

  </div>

  <!-- INFO -->
  <div class="alert alert-info mt-3 mb-0">

    Arrastra los elementos para definir el orden correcto.

  </div>

</div>
