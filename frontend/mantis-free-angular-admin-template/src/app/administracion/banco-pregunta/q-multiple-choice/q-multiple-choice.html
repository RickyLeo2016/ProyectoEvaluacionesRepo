<div class="row">

  <div class="col-12 mb-2">
    <button class="btn btn-sm btn-primary" (click)="agregarOpcion()">
      + Agregar opción
    </button>
  </div>

  <div class="col-12"
       *ngFor="let op of opciones; let i = index; trackBy: trackById">

    <div class="input-group mb-2">

      <div class="input-group-text">

        <input
          *ngIf="!multiple"
          type="radio"
          name="correcta"
          [checked]="esSeleccionado(i)"
          (change)="seleccionarRadio(i)"
        />

        <input
          *ngIf="multiple"
          type="checkbox"
          [checked]="esSeleccionado(i)"
          (change)="toggleCheckbox(i)"
        />

      </div>

      <input
        type="text"
        class="form-control"
        [(ngModel)]="op.text"
        (ngModelChange)="emitir()"
        placeholder="Texto de la opción"
      />

      <button
        class="btn btn-danger btn-sm"
        (click)="eliminarOpcion(i)"
        [disabled]="opciones.length <= 2"
      >
        <i class="fas fa-trash"></i>
      </button>

    </div>

  </div>

</div>
