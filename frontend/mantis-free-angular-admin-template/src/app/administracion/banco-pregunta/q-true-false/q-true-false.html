<div class="row">

  <!-- RESPUESTA CORRECTA -->
  <div class="col-md-4 mb-3">
    <label class="form-label">Respuesta correcta</label>

    <!-- 🔥 FIX: sincronizado con respuesta -->
    <select
      class="form-select"
      [value]="respuesta.toString()"
      (change)="onRespuestaChange($event)">

      <option value="true">{{ labels.true }}</option>
      <option value="false">{{ labels.false }}</option>

    </select>
  </div>

  <!-- TEXTO VERDADERO -->
  <div class="col-md-4 mb-3">
    <label class="form-label">Texto Verdadero</label>

    <input
      type="text"
      class="form-control"
      [value]="labels.true"
      (input)="onLabelChange('true', $event)"
    />
  </div>

  <!-- TEXTO FALSO -->
  <div class="col-md-4 mb-3">
    <label class="form-label">Texto Falso</label>

    <input
      type="text"
      class="form-control"
      [value]="labels.false"
      (input)="onLabelChange('false', $event)"
    />
  </div>

</div>
