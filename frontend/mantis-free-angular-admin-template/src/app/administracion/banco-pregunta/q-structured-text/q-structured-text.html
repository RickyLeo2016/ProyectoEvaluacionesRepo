<div class="row">

  <div class="col-md-6">
    <label>Mínimo caracteres</label>
    <input type="number"
      class="form-control"
      [(ngModel)]="minLength"
      (ngModelChange)="onChange()">
  </div>

  <div class="col-md-6">
    <label>Máximo caracteres</label>
    <input type="number"
      class="form-control"
      [(ngModel)]="maxLength"
      (ngModelChange)="onChange()">
  </div>

  <div class="col-12 mt-2">
    <label>Placeholder</label>
    <input type="text"
      class="form-control"
      [(ngModel)]="placeholder"
      (ngModelChange)="onChange()">
  </div>

  <div class="col-12 mt-2">
    <label>
      <input type="checkbox"
        [(ngModel)]="multiline"
        (ngModelChange)="onChange()">
      Multilínea
    </label>
  </div>

</div>

<hr />

<!-- PREVIEW -->
<div class="mt-3">
  <h6>Previsualización</h6>

  <textarea *ngIf="multiline"
    class="form-control"
    [attr.maxlength]="maxLength"
    rows="4"></textarea>

  <input *ngIf="!multiline"
    type="text"
    class="form-control"
    [attr.maxlength]="maxLength">
</div>
