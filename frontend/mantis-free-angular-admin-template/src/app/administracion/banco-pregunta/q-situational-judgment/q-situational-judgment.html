<div class="row">

  <div class="col-12 mb-2">
    <button class="btn btn-sm btn-primary" (click)="add()">
      + Agregar opción
    </button>
  </div>

  <div
    class="col-12"
    *ngFor="let op of opciones; let i = index; trackBy: trackById"
  >
    <div class="input-group mb-2">

      <!-- TEXTO -->
      <input
        type="text"
        class="form-control"
        [(ngModel)]="op.text"
        (ngModelChange)="onChange()"
        placeholder="Descripción de la situación"
      />

      <!-- SCORE -->
      <input
        type="number"
        class="form-control"
        style="max-width: 100px"
        [(ngModel)]="op.score"
        (ngModelChange)="onChange()"
        placeholder="Puntaje"
      />

      <!-- ELIMINAR -->
      <button
        class="btn btn-danger btn-sm"
        (click)="remove(i)"
        [disabled]="opciones.length <= 2"
      >
        <i class="fas fa-trash"></i>
      </button>

    </div>
  </div>

</div>
