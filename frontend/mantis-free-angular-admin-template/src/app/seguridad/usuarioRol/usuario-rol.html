<app-spinner
    #spinnerExterno
  [manual]="true"
  [visible]="spinnerVisible()">
</app-spinner>


<div class="row">
  <div class="col-sm-12">
    <app-card cardTitle="Lista de Usuarios">
      <app-grid
        [columnas]="columnas"
        [datos]="tiposFiltrados()" 
        [templates]="{ acciones: accionesTemplate }">
      </app-grid>

      <ng-template #accionesTemplate let-item>
        <span *ngFor="let accion of accionesTabla"
              class="accion-icono"
              [title]="accion.title"
              (click)="accion.callback(item)"
              [style.color]="accion.color">
          <i [class]="accion.icon"></i>
        </span>
      </ng-template>
    </app-card>

    <!-- ============================
         MODAL
    ============================ -->
    <app-modal
      [title]="tituloModal()"
      [visible]="modalVisible"
      (closed)="cerrarModal()">

      <div class="container">
        <div class="row">
            <app-grid
                [columnas]="columnasUsuarioRoles"
                [datos]="rolesFiltrados()"
                [templates]="templatesGrid">
                
                <ng-template #rolSelecTemplate let-item>
                <input
                type="checkbox"
                [checked]="item.rolSelec === 1"
                (change)="onRolChange(item, $event)"
                />
                </ng-template>
            </app-grid>
        </div>

        <!-- Botones -->
        <div class="mt-4 text-end">
          <button class="btn btn-success btn-sm" (click)="guardar()">
            <i class="fas fa-save"></i>
            Guardar
          </button>
          <button class="btn btn-danger btn-sm" (click)="cerrarModal()">
            <i class="fas fa-ban"></i>
            Cancelar
          </button>
        </div>
      </div>

    </app-modal>
  </div>
</div>
